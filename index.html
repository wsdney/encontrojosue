<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ficha de Inscrição - Encontro JOSUE</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: sans-serif; background: #f0f0f0; margin: 20px; }
    form { background: #fff; padding: 20px; border-radius: 8px; max-width: 700px; margin: auto; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, textarea { width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; }
    .radio-group { display: flex; gap: 20px; margin-top: 5px; }
    button { margin-top: 20px; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #218838; }
  </style>
</head>
<body>
  <h1 style="text-align:center;">Ficha de Inscrição - Encontro JOSUE</h1>
  <form id="formInscricao">
    <label>Nome:</label>
    <input type="text" name="nome" required>

    <label>Endereço:</label>
    <input type="text" name="endereco" required>

    <label>Cidade:</label>
    <input type="text" name="cidade" required>

    <label>Data de Nascimento:</label>
    <input type="date" name="nascimento" required>

    <label>Estado Civil:</label>
    <div class="radio-group">
      <label><input type="radio" name="estadoCivil" value="Solteiro(a)" required> Solteiro(a)</label>
      <label><input type="radio" name="estadoCivil" value="Casado(a)"> Casado(a)</label>
    </div>

    <label>Telefone:</label>
    <input type="tel" name="telefone" required>

    <label>Celular:</label>
    <input type="tel" name="celular" required>

    <label>Contato 1:</label>
    <input type="text" name="contato1" required>

    <label>Contato 2:</label>
    <input type="text" name="contato2" required>

    <label>Faz parte de igreja evangélica?</label>
    <div class="radio-group">
      <label><input type="radio" name="igrejaEvangelica" value="Sim" required> Sim</label>
      <label><input type="radio" name="igrejaEvangelica" value="Não"> Não</label>
    </div>

    <label>Qual igreja?</label>
    <input type="text" name="nomeIgreja" required>

    <label>Já fez o Encontro com Deus?</label>
    <div class="radio-group">
      <label><input type="radio" name="encontroComDeus" value="Sim" required> Sim</label>
      <label><input type="radio" name="encontroComDeus" value="Não"> Não</label>
    </div>

    <label>Faz uso de medicamentos?</label>
    <div class="radio-group">
      <label><input type="radio" name="medicamento" value="Sim" required> Sim</label>
      <label><input type="radio" name="medicamento" value="Não"> Não</label>
    </div>

    <label>Quais e horários da medicação:</label>
    <textarea name="horariosMedicacao" rows="3"></textarea>

    <button type="submit">Enviar Inscrição</button>
  </form>

  <script>
    // 🔗 URL do Google Apps Script
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8cxBIVqAa9vSJ707x2kk2ZJBa_6bF6H9tjsEI5iY0Esgq7TekKw17y8PyaCOwP7pk7g/exec";

    document.getElementById('formInscricao').addEventListener('submit', async function(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = {};
      formData.forEach((value, key) => data[key] = value);

      try {
        const resp = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(data)
        });
        const result = await resp.json();

        if (result.success) {
          const numero = result.numero;

          // === PDF Estilizado em 2 páginas ===
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF("p", "mm", "a4");

          // Cabeçalho azul
          doc.setFillColor(200, 220, 255);
          doc.rect(20, 15, 170, 10, "F");
          doc.setFontSize(14);
          doc.setFont("helvetica", "bold");
          doc.setTextColor(0, 0, 80);
          doc.text("FICHA DE INSCRIÇÃO - ENCONTRO JOSUE", 105, 22, { align: "center" });
          doc.setTextColor(0, 0, 0);

          let y = 40;

          // Seção Dados Pessoais
          doc.setFontSize(12);
          doc.setFont("helvetica", "bold");
          doc.text("DADOS PESSOAIS", 20, y);
          doc.line(20, y+2, 190, y+2);
          y += 10;

          doc.setFont("helvetica", "normal");
          doc.text(`Nome: ${data.nome}`, 20, y); y += 8;
          doc.text(`Data de Nascimento: ${data.nascimento}`, 20, y); y += 8;
          doc.text(`Estado Civil: ${data.estadoCivil}`, 20, y); y += 8;
          doc.text(`Telefone: ${data.telefone}`, 20, y); y += 8;
          doc.text(`Celular: ${data.celular}`, 20, y); y += 8;
          doc.text(`Contato 1: ${data.contato1}`, 20, y); y += 8;
          doc.text(`Contato 2: ${data.contato2}`, 20, y); y += 10;

          // Seção Igreja
          doc.setFont("helvetica", "bold");
          doc.text("INFORMAÇÕES RELIGIOSAS", 20, y);
          doc.line(20, y+2, 190, y+2);
          y += 10;

          doc.setFont("helvetica", "normal");
          doc.text(`Faz parte de Igreja Evangélica: ${data.igrejaEvangelica}`, 20, y); y += 8;
          doc.text(`Nome da Igreja: ${data.nomeIgreja}`, 20, y); y += 8;
          doc.text(`Já fez Encontro com Deus: ${data.encontroComDeus}`, 20, y); y += 10;

          // Seção Saúde
          doc.setFont("helvetica", "bold");
          doc.text("SAÚDE", 20, y);
          doc.line(20, y+2, 190, y+2);
          y += 10;

          doc.setFont("helvetica", "normal");
          doc.text(`Faz uso de medicamentos: ${data.medicamento}`, 20, y); y += 8;
          doc.text(`Quais e horários: ${data.horariosMedicacao || "N/A"}`, 20, y); y += 20;

          // Assinatura
          doc.line(60, y, 150, y);
          doc.text("Assinatura", 105, y + 6, { align: "center" });

          // --- Página 2: Comprovante ---
          doc.addPage();
          doc.setFont("helvetica", "bold");
          doc.setFontSize(14);
          doc.text("COMPROVANTE DE INSCRIÇÃO", 105, 20, { align: "center" });
          doc.line(20, 25, 190, 25);

          doc.setFont("helvetica", "normal");
          doc.setFontSize(12);
          doc.text(`Inscrição Nº: ${numero}`, 20, 40);
          doc.text(`Nome: ${data.nome}`, 20, 48);
          doc.text(`Telefone: ${data.telefone}`, 20, 56);

          const dataAtual = new Date().toLocaleDateString("pt-BR");
          doc.text(`Data: ${dataAtual}`, 20, 70);

          doc.line(60, 100, 150, 100);
          doc.text("Secretaria", 105, 106, { align: "center" });

          // Salvar PDF
          doc.save(`Ficha_Inscricao_${numero}.pdf`);

          // =============================

          e.target.reset();
          alert(`Inscrição enviada com sucesso! Seu número é ${numero}. O PDF foi baixado.`);
        } else {
          alert('Erro ao enviar inscrição: ' + result.error);
        }
      } catch (err) {
        alert('Falha na conexão com o servidor.');
      }
    });
  </script>
</body>
</html>
